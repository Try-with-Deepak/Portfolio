/* Wave animation */

.wave{

top:-60px;
left:0;
width:100%;
height:60px;
background:url("https://i.ibb.co/wQZVxxk/wave.png");
background-size:1000px 60px;
animation:wave 8s linear infinite;
}

@keyframes wave{
0%{background-position-x:0;}
100%{background-position-x:1000px;}
} </style>
